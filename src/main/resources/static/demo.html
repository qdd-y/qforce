<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qforce 使用流程演示</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f7fb;
            --card: #ffffff;
            --line: #d9e2f0;
            --text: #1f2937;
            --muted: #64748b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --ok: #166534;
            --warn: #92400e;
            --err: #b91c1c;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--text);
            background: var(--bg);
        }
        .wrap {
            max-width: 1080px;
            margin: 0 auto;
            padding: 24px;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 28px;
        }
        .sub {
            margin: 0 0 20px;
            color: var(--muted);
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 16px;
        }
        .title {
            margin: 0 0 12px;
            font-size: 18px;
        }
        .hint {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 13px;
        }
        label {
            display: block;
            font-size: 14px;
            margin: 10px 0 6px;
            font-weight: 600;
        }
        input, textarea, button {
            font: inherit;
        }
        input, textarea {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px 12px;
            background: #fff;
            color: var(--text);
        }
        textarea {
            min-height: 88px;
            resize: vertical;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .btns {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 10px 16px;
            cursor: pointer;
            color: #fff;
            background: var(--primary);
            font-weight: 600;
        }
        button:hover {
            background: var(--primary-hover);
        }
        button.secondary {
            background: #0f766e;
        }
        button.secondary:hover {
            background: #0d5f59;
        }
        .status {
            margin-top: 10px;
            min-height: 20px;
            font-size: 14px;
        }
        .status.ok { color: var(--ok); }
        .status.warn { color: var(--warn); }
        .status.err { color: var(--err); }
        .kvs {
            display: grid;
            grid-template-columns: repeat(2, minmax(180px, 1fr));
            gap: 8px 12px;
        }
        .kv {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px 10px;
            background: #fbfcff;
        }
        .kv .k {
            font-size: 12px;
            color: var(--muted);
        }
        .kv .v {
            font-size: 15px;
            margin-top: 2px;
            word-break: break-word;
        }
        ol, ul {
            margin: 8px 0 0 20px;
            padding: 0;
        }
        li { margin: 8px 0; }
        code {
            background: #eef2ff;
            border: 1px solid #dbe3ff;
            border-radius: 6px;
            padding: 2px 6px;
        }
        .muted { color: var(--muted); }
        @media (max-width: 760px) {
            .row, .kvs { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <h1>qforce 上线流程演示页</h1>
    <p class="sub">模拟真实使用：用户输入事件 → 系统预测行动 → 用户反馈真实结果 → 系统学习更新画像。</p>

    <div class="grid">
        <section class="card">
            <h2 class="title">Step 0. 接口地址</h2>
            <label for="apiBase">API Base URL</label>
            <input id="apiBase" value="">
            <div class="btns">
                <button id="checkBtn" type="button">检测后端连通性</button>
            </div>
            <div id="checkStatus" class="status"></div>
            <p class="hint">默认使用当前站点地址。例如本地启动后通常是 <code>http://localhost:8080</code>。</p>
        </section>

        <section class="card">
            <h2 class="title">Step 1. 用户输入“发生的一件事”</h2>
            <label for="eventInput">事件描述</label>
            <textarea id="eventInput">今天老板突然要求项目提前交付，我和同事因为方案起了争执，晚上朋友安慰了我。</textarea>
            <div class="btns">
                <button id="predictBtn" type="button">开始预测</button>
            </div>
            <div id="predictStatus" class="status"></div>
        </section>

        <section class="card">
            <h2 class="title">Step 2. 预测结果（系统返回）</h2>
            <div id="predictMeta" class="kvs"></div>
            <h3>Top 行动</h3>
            <ol id="behaviors"><li class="muted">暂无数据</li></ol>
            <h3>证据</h3>
            <ul id="evidence"><li class="muted">暂无数据</li></ul>
            <h3>模型说明</h3>
            <p id="reasoning" class="muted">暂无数据</p>
        </section>

        <section class="card">
            <h2 class="title">Step 3. 用户反馈“真实发生的行动”</h2>
            <div class="row">
                <div>
                    <label for="predictionId">predictionId</label>
                    <input id="predictionId" type="number" placeholder="先完成一次预测后会自动填充">
                </div>
                <div>
                    <label for="occurredAt">发生时间（可选）</label>
                    <input id="occurredAt" type="datetime-local">
                </div>
            </div>
            <label for="actualAction">真实行动</label>
            <textarea id="actualAction" placeholder="例如：我先找同事沟通并约了下午同步方案。"></textarea>
            <div class="btns">
                <button id="feedbackBtn" type="button" class="secondary">提交反馈并学习</button>
            </div>
            <div id="feedbackStatus" class="status"></div>
        </section>

        <section class="card">
            <h2 class="title">Step 4. 学习结果（画像更新）</h2>
            <div id="feedbackMeta" class="kvs"></div>
            <h3>当前 adaptiveProfile</h3>
            <div id="profile" class="kvs"><div class="muted">暂无数据</div></div>
        </section>
    </div>
</div>

<script>
    const apiBaseInput = document.getElementById("apiBase");
    const checkBtn = document.getElementById("checkBtn");
    const checkStatus = document.getElementById("checkStatus");
    const eventInput = document.getElementById("eventInput");
    const predictBtn = document.getElementById("predictBtn");
    const predictStatus = document.getElementById("predictStatus");
    const predictMeta = document.getElementById("predictMeta");
    const behaviors = document.getElementById("behaviors");
    const evidence = document.getElementById("evidence");
    const reasoning = document.getElementById("reasoning");

    const predictionIdInput = document.getElementById("predictionId");
    const occurredAtInput = document.getElementById("occurredAt");
    const actualActionInput = document.getElementById("actualAction");
    const feedbackBtn = document.getElementById("feedbackBtn");
    const feedbackStatus = document.getElementById("feedbackStatus");
    const feedbackMeta = document.getElementById("feedbackMeta");
    const profile = document.getElementById("profile");

    apiBaseInput.value = window.location.protocol === "file:" ? "http://localhost:8080" : window.location.origin;

    function setStatus(el, type, text) {
        el.className = "status " + type;
        el.textContent = text || "";
    }

    function escapeHtml(text) {
        return String(text)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll("\"", "&quot;")
            .replaceAll("'", "&#39;");
    }

    function renderKvs(el, rows) {
        if (!rows || rows.length === 0) {
            el.innerHTML = "<div class='muted'>暂无数据</div>";
            return;
        }
        el.innerHTML = rows.map(r =>
            "<div class='kv'><div class='k'>" + escapeHtml(r.k) + "</div><div class='v'>" + escapeHtml(r.v) + "</div></div>"
        ).join("");
    }

    function normalizeBase() {
        const raw = apiBaseInput.value.trim();
        if (!raw) {
            throw new Error("API Base URL 不能为空。");
        }
        return raw.replace(/\/+$/, "");
    }

    async function postJson(path, payload) {
        const base = normalizeBase();
        let resp;
        try {
            resp = await fetch(base + path, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
        } catch (e) {
            throw new Error("网络请求失败（Failed to fetch）。请确认后端已启动、API Base URL 正确，且浏览器未被跨域/混合内容拦截。");
        }
        const data = await resp.json().catch(() => ({}));
        if (!resp.ok) {
            const msg = data.error || data.message || JSON.stringify(data) || ("HTTP " + resp.status);
            throw new Error(msg);
        }
        return data;
    }

    async function checkHealth() {
        const base = normalizeBase();
        let resp;
        try {
            resp = await fetch(base + "/actuator/health");
        } catch (e) {
            throw new Error("无法连接后端。请检查服务是否启动，地址是否可访问。");
        }
        if (!resp.ok) {
            throw new Error("健康检查失败：HTTP " + resp.status);
        }
        const data = await resp.json().catch(() => ({}));
        if (data.status && data.status !== "UP") {
            throw new Error("后端状态异常：" + data.status);
        }
        return "后端可用（/actuator/health 正常）。";
    }

    checkBtn.addEventListener("click", async () => {
        setStatus(checkStatus, "warn", "检测中...");
        checkBtn.disabled = true;
        try {
            const msg = await checkHealth();
            setStatus(checkStatus, "ok", msg);
        } catch (err) {
            setStatus(checkStatus, "err", err.message);
        } finally {
            checkBtn.disabled = false;
        }
    });

    predictBtn.addEventListener("click", async () => {
        const eventText = eventInput.value.trim();
        if (!eventText) {
            setStatus(predictStatus, "warn", "请先输入事件描述。");
            return;
        }

        setStatus(predictStatus, "warn", "预测中...");
        predictBtn.disabled = true;

        try {
            const data = await postJson("/api/predict-behavior/simple", { event: eventText });
            const result = data || {};

            renderKvs(predictMeta, [
                { k: "predictionId", v: result.predictionId ?? "-" },
                { k: "usedLlm", v: String(result.usedLlm) },
                { k: "mood", v: String(result.impactScore?.mood ?? "-") },
                { k: "focus", v: String(result.impactScore?.focus ?? "-") },
                { k: "stress", v: String(result.impactScore?.stress ?? "-") }
            ]);

            const top = Array.isArray(result.topBehaviors) ? result.topBehaviors : [];
            behaviors.innerHTML = top.length
                ? top.map(i => "<li><strong>" + escapeHtml(i.behavior || "-") + "</strong>（" +
                    Math.round((Number(i.probability || 0) * 10000)) / 100 + "%）<br><span class='muted'>" +
                    escapeHtml(i.reason || "") + "</span></li>").join("")
                : "<li class='muted'>暂无数据</li>";

            const ev = Array.isArray(result.evidence) ? result.evidence : [];
            evidence.innerHTML = ev.length
                ? ev.map(i => "<li>" + escapeHtml(i) + "</li>").join("")
                : "<li class='muted'>暂无数据</li>";

            reasoning.textContent = result.modelReasoning || "-";
            if (result.predictionId) {
                predictionIdInput.value = result.predictionId;
            }
            setStatus(predictStatus, "ok", "预测完成。可以继续提交真实行动反馈。");
        } catch (err) {
            setStatus(predictStatus, "err", "预测失败：" + err.message);
        } finally {
            predictBtn.disabled = false;
        }
    });

    feedbackBtn.addEventListener("click", async () => {
        const predictionId = Number(predictionIdInput.value);
        const actualAction = actualActionInput.value.trim();
        if (!predictionId) {
            setStatus(feedbackStatus, "warn", "请填写 predictionId。");
            return;
        }
        if (!actualAction) {
            setStatus(feedbackStatus, "warn", "请填写真实行动。");
            return;
        }

        const payload = { predictionId, actualAction };
        if (occurredAtInput.value) {
            payload.occurredAt = new Date(occurredAtInput.value).toISOString();
        }

        setStatus(feedbackStatus, "warn", "反馈提交中...");
        feedbackBtn.disabled = true;

        try {
            const data = await postJson("/api/predict-behavior/feedback", payload);
            renderKvs(feedbackMeta, [
                { k: "predictionId", v: String(data.predictionId ?? "-") },
                { k: "matchedTopBehavior", v: String(data.matchedTopBehavior) },
                { k: "matchedBehavior", v: data.matchedBehavior || "-" }
            ]);

            const p = data.adaptiveProfile || {};
            renderKvs(profile, [
                { k: "moodSensitivity", v: String(p.moodSensitivity ?? "-") },
                { k: "focusSensitivity", v: String(p.focusSensitivity ?? "-") },
                { k: "stressSensitivity", v: String(p.stressSensitivity ?? "-") },
                { k: "procrastinationBaseline", v: String(p.procrastinationBaseline ?? "-") },
                { k: "actionBaseline", v: String(p.actionBaseline ?? "-") },
                { k: "helpSeekingBaseline", v: String(p.helpSeekingBaseline ?? "-") }
            ]);
            setStatus(feedbackStatus, "ok", "反馈已入库，adaptive profile 已更新。");
        } catch (err) {
            setStatus(feedbackStatus, "err", "反馈失败：" + err.message);
        } finally {
            feedbackBtn.disabled = false;
        }
    });
</script>
</body>
</html>
